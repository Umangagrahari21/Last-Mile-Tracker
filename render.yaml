services:
  - type: web
    name: last-mile-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
        placeholder: "Your Neon PostgreSQL connection string"
      - key: JWT_SECRET
        sync: false
        placeholder: "Random 32+ character JWT Secret key"
      - key: GMAIL_USER
        sync: false
        placeholder: "Your Gmail address (e.g., burgerhut.notifications@gmail.com)"
      - key: GMAIL_APP_PASSWORD
        sync: false
        placeholder: "Your 16-character Gmail App Password"
      - key: FRONTEND_URL
        sync: false
        placeholder: "Your Vercel deployment URL (add after deploying frontend)"
